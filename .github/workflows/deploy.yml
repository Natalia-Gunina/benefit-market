name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Prepare build args
        id: buildargs
        run: |
          {
            echo "value<<ENDOFARGS"
            [ -n "$SUPABASE_URL" ] && echo "NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}"
            [ -n "$SUPABASE_ANON" ] && echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON}"
            echo "NEXT_PUBLIC_DEMO_MODE=${DEMO_MODE:-false}"
            echo "ENDOFARGS"
          } >> "$GITHUB_OUTPUT"
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          DEMO_MODE: ${{ vars.NEXT_PUBLIC_DEMO_MODE }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: ${{ steps.buildargs.outputs.value }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2299
          envs: GHCR_TOKEN, OPENAI_API_KEY
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u natalia-gunina --password-stdin
            cd /root/benefit-market
            # Sync runtime secrets from GitHub Secrets into .env on the VPS.
            # Only updates keys we explicitly manage here; other lines are
            # preserved as-is. Empty/unset secrets are skipped so we never
            # blank out a value that was set manually.
            if [ -n "$OPENAI_API_KEY" ]; then
              grep -v '^OPENAI_API_KEY=' .env > .env.tmp 2>/dev/null || touch .env.tmp
              echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env.tmp
              mv .env.tmp .env
              chmod 600 .env
            fi
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
