name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Prepare build args
        id: buildargs
        run: |
          {
            echo "value<<ENDOFARGS"
            [ -n "$SUPABASE_URL" ] && echo "NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}"
            [ -n "$SUPABASE_ANON" ] && echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON}"
            echo "NEXT_PUBLIC_DEMO_MODE=${DEMO_MODE:-false}"
            echo "ENDOFARGS"
          } >> "$GITHUB_OUTPUT"
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          DEMO_MODE: ${{ vars.NEXT_PUBLIC_DEMO_MODE }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: ${{ steps.buildargs.outputs.value }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2299
          script: |
            cd /root/benefit-market
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            docker image prune -f
