name: DB migrate

# Applies Supabase migrations on every push to main that touches
# supabase/migrations/. Also exposes a manual run with options:
#
#   • dry_run=true             — show pending migrations without applying.
#   • mark_applied=<versions>  — comma-separated version numbers to mark
#                                as already applied (no-op apply). Use
#                                this once after enabling the workflow
#                                to register migrations 00001..00008
#                                that were applied manually before CI/CD.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — Personal access token (Account → Tokens).
#   SUPABASE_PROJECT_REF   — Project ref (e.g. abcdefghijklmnop).
#                            Found in Project Settings → General.
#   SUPABASE_DB_PASSWORD   — Database password
#                            (Project Settings → Database → Database password).

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/db-migrate.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not apply)"
        type: boolean
        default: false
      mark_applied:
        description: "Comma-separated migration versions to mark as already applied"
        type: string
        default: ""

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: |
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Mark migrations as applied
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mark_applied != '' }}
        run: |
          IFS=',' read -ra VERSIONS <<< "${{ inputs.mark_applied }}"
          for v in "${VERSIONS[@]}"; do
            v_trimmed="$(echo -n "$v" | xargs)"
            echo "→ Marking $v_trimmed as applied"
            supabase migration repair \
              --status applied \
              --password "$SUPABASE_DB_PASSWORD" \
              "$v_trimmed"
          done

      - name: Show pending migrations
        run: |
          supabase migration list --password "$SUPABASE_DB_PASSWORD" || true

      - name: Apply migrations
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        run: |
          supabase db push \
            --password "$SUPABASE_DB_PASSWORD" \
            --include-all
